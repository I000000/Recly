services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-recly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-recly_db}
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "recly", "-d", "recly_db"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 5s
      retries: 5

  go-api:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      DATABASE_URL: postgres://${POSTGRES_USER:-recly}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-recly_db}?sslmode=disable
      REDIS_URL: redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      JWT_SECRET: ${JWT_SECRET}
      ACCESS_TOKEN_TTL: 60
      REFRESH_TOKEN_TTL: 43200
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  ml-worker:
    build: ./ml-worker
    environment:
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
      EMBEDDINGS_PATH: /data/embeddings_2k.h5
      BOOK_PARQUET: /data/goodreads_2k.parquet
      MOVIE_PARQUET: /data/tmdb_2k.parquet
      DATABASE_URL: postgres://${POSTGRES_USER:-recly}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-recly_db}?sslmode=disable
    volumes:
      - ./data:/data
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.10
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-CHANGE_ME}
      MEILI_ENV: development
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      retries: 5
    restart: unless-stopped

  indexer:
    build: ./indexer
    environment:
      MEILI_URL: http://meilisearch:7700
      MEILI_KEY: ${MEILI_MASTER_KEY:-CHANGE_ME}
      BOOK_PARQUET: /data/goodreads_2k.parquet
      MOVIE_PARQUET: /data/tmdb_2k.parquet
      PYTHONUNBUFFERED: 1
    depends_on:
      meilisearch:
        condition: service_healthy
    volumes:
      - ./data:/data:ro

volumes:
  pgdata:
  meili_data: